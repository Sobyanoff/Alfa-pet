<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alfa Tracker">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230A0A0F'/><text x='90' y='118' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-size='110' font-weight='800' fill='%23EF3124' text-anchor='middle'>A</text></svg>">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230A0A0F'/><text x='16' y='22' font-family='sans-serif' font-size='20' font-weight='800' fill='%23EF3124' text-anchor='middle'>A</text></svg>">
  <title>Alfa Tracker</title>
  <style>
    :root {
      /* Brand */
      --red: #EF3124;
      --red-deep: #C81E1E;
      --red-tint: #FFE5E3;
      --green: #00B956;
      --green-deep: #00A04A;
      --green-tint: #E0F8EC;

      /* Neutral */
      --ink: #0A0A0F;
      --slate-700: #2A2A35;
      --slate-500: #6B6B78;
      --slate-300: #C9C9D0;
      --slate-200: #E8E8EE;
      --slate-100: #F2F2F6;
      --snow: #F7F7FA;

      /* Semantic */
      --warn: #F59E0B;
      --danger: #DC2626;

      /* Surfaces */
      --bg: var(--snow);
      --card: #FFFFFF;
      --text: var(--ink);
      --muted: var(--slate-500);
      --border: var(--slate-200);

      /* Form */
      --r-card: 18px;
      --r-btn: 14px;
      --r-btn-sm: 10px;

      /* Shadow */
      --sh-card: 0 1px 2px rgba(10,10,15,.04), 0 8px 24px rgba(10,10,15,.04);
      --sh-pop: 0 6px 20px rgba(239,49,36,.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display',
                   'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100svh;
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: #fff;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      border-bottom: 3px solid var(--red);
    }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
    header h1 b { color: var(--red); font-weight: 800; }
    .hmeta { font-size: 11px; opacity: .55; margin-top: 1px; font-weight: 500; }
    .hback {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      border-radius: var(--r-btn-sm);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, transform .08s;
      font-family: inherit;
    }
    .hback:hover { background: rgba(255,255,255,.16); }
    .hback:active { transform: scale(.96); }

    /* ── Layout ── */
    .wrap { max-width: 480px; margin: 0 auto; padding: 14px 12px 32px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--r-card);
      padding: 18px;
      margin-bottom: 10px;
      box-shadow: var(--sh-card);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }
    .card-desc {
      font-size: 14px;
      color: var(--slate-700);
      margin-bottom: 14px;
      line-height: 1.45;
    }
    .subhead {
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 14px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subhead:first-child { margin-top: 0; }
    .subhead .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); }

    /* ── Hero (сводка дня) ── */
    .hero {
      background: var(--card);
      border-radius: var(--r-card);
      padding: 22px 20px 20px;
      margin-bottom: 10px;
      box-shadow: var(--sh-card);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 100% 0%, var(--red-tint) 0%, transparent 65%);
      opacity: .85;
      pointer-events: none;
    }
    .hero-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      position: relative;
    }
    .hero-amount {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin: 6px 0 8px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      position: relative;
    }
    .hero-amount .ru { font-weight: 600; opacity: .35; margin-left: 4px; font-size: 28px; }
    .hero-amount.zero { color: var(--slate-300); }
    .hero-meta {
      display: flex;
      gap: 14px;
      font-size: 13px;
      color: var(--slate-500);
      position: relative;
      flex-wrap: wrap;
    }
    .hero-meta span b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
    .hero-cta { margin-top: 16px; position: relative; }

    /* ── Primary CTA ── */
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--r-btn);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -.01em;
      box-shadow: var(--sh-pop);
      transition: transform .08s, box-shadow .15s, background .15s;
      font-family: inherit;
    }
    .cta:hover { background: var(--red-deep); }
    .cta:active { transform: scale(.98); box-shadow: 0 2px 8px rgba(239,49,36,.3); }

    /* ── Buttons ── */
    .grid { display: grid; gap: 8px; }
    .g1 { grid-template-columns: 1fr; }
    .g2 { grid-template-columns: 1fr 1fr; }
    .g3 { grid-template-columns: 1fr 1fr 1fr; }

    .btn {
      position: relative;
      padding: 14px 8px;
      min-height: 56px;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: var(--r-btn);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      color: var(--ink);
      transition: transform .08s, background .15s, border-color .15s, box-shadow .2s, color .15s;
      line-height: 1.2;
      font-family: inherit;
      letter-spacing: -.005em;
    }
    .btn:hover { background: var(--slate-100); border-color: var(--slate-300); }
    .btn:active { transform: scale(.96); }
    .btn-full { grid-column: 1/-1; display: block; width: 80%; margin-left: auto; margin-right: auto; }
    .btn-sm { padding: 8px 12px; min-height: 0; font-size: 13px; border-radius: var(--r-btn-sm); }

    /* Selected state — главное визуальное решение */
    .btn.on {
      background: var(--red);
      border-color: var(--red-deep);
      color: #fff;
      font-weight: 700;
      box-shadow: var(--sh-pop);
      animation: pulse .35s ease;
      padding-left: 22px;
    }
    .btn.on::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 50%;
      width: 6px;
      height: 10px;
      margin-top: -7px;
      border: solid #fff;
      border-width: 0 2.4px 2.4px 0;
      transform: rotate(45deg);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    .btn-red { background: var(--red); color: #fff; border-color: var(--red-deep); box-shadow: var(--sh-pop); }
    .btn-red:hover { background: var(--red-deep); }
    .btn-green { background: var(--green); color: #fff; border-color: var(--green-deep); }
    .btn-green:hover { background: var(--green-deep); }
    .btn-green.on { background: var(--green); border-color: var(--green-deep); box-shadow: 0 6px 20px rgba(0,185,86,.3); }
    .btn-outline { background: transparent; border-color: var(--red); color: var(--red); box-shadow: none; }
    .btn-outline:hover { background: var(--red-tint); }
    .btn-gray { background: var(--slate-100); color: var(--slate-700); border-color: var(--slate-200); box-shadow: none; }
    .btn-gray:hover { background: var(--slate-200); }
    .btn-danger { background: transparent; border-color: var(--slate-200); color: var(--danger); box-shadow: none; }
    .btn-danger:hover { background: #FEF2F2; border-color: var(--danger); }
    .btn-warn { background: var(--warn); color: #fff; border-color: var(--warn); }

    /* ── Result rows ── */
    .rrow {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid var(--slate-100);
      font-size: 14px;
      gap: 12px;
    }
    .rrow:last-child { border-bottom: none; }
    .rlabel { color: var(--slate-500); }
    .rval { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink); }
    .total {
      font-size: 32px;
      font-weight: 800;
      color: var(--red);
      text-align: center;
      padding: 14px 0 4px;
      letter-spacing: -.025em;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    /* ── History ── */
    .hi {
      padding: 12px 0;
      border-bottom: 1px solid var(--slate-100);
      font-size: 14px;
    }
    .hi:last-child { border-bottom: none; }
    .hi-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; gap: 10px; }
    .hi-name { font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hi-sum { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .hi-sub {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .hi-del {
      background: transparent;
      border: none;
      color: var(--slate-300);
      cursor: pointer;
      padding: 4px 8px;
      margin: -4px -4px -4px 0;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      transition: color .12s, background .12s;
      font-family: inherit;
    }
    .hi-del:hover { color: var(--danger); background: #FEF2F2; }

    /* ── Input ── */
    input[type=text] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-btn);
      font-size: 15px;
      outline: none;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus { border-color: var(--red); box-shadow: 0 0 0 4px var(--red-tint); }
    input[type=text]::placeholder { color: var(--slate-300); }

    /* ── Empty / chips / sep ── */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 16px;
      font-size: 13px;
      line-height: 1.55;
    }
    .empty b { color: var(--ink); display: block; margin-bottom: 4px; font-size: 14px; }

    .sep { height: 1px; background: var(--slate-100); margin: 12px 0; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .chip {
      background: var(--slate-100);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--slate-700);
      border: 1px solid transparent;
    }
    .chip.red { background: var(--red-tint); color: var(--red-deep); border-color: rgba(239,49,36,.18); font-weight: 600; }

    /* ── Step badge & progress ── */
    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red-tint);
      color: var(--red-deep);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      letter-spacing: .02em;
    }
    .progress {
      height: 4px;
      background: var(--slate-100);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--red-deep));
      border-radius: 4px;
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }

    /* ── Accordion ── */
    .acc { border-top: 1px solid var(--slate-100); margin-top: 6px; }
    .acc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 14px 0 10px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      font-family: inherit;
      text-align: left;
      transition: color .15s;
    }
    .acc-head:hover { color: var(--red); }
    .acc-arr {
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--slate-500);
      transition: transform .25s;
      font-size: 16px;
    }
    .acc.open .acc-arr { transform: rotate(180deg); color: var(--red); }
    .acc-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
    .acc.open .acc-body { max-height: 3000px; }
    .acc-inner { padding: 0 0 8px; }

    /* ── BS tier (внутри детального блока) ── */
    .tier {
      background: var(--slate-100);
      border-radius: 12px;
      padding: 14px;
      margin: 10px 0 16px;
    }
    .tier-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; margin-bottom: 10px;
    }
    .tier-title { font-size: 13px; font-weight: 700; color: var(--ink); }
    .tier-rate {
      font-size: 13px; font-weight: 800; color: var(--red);
      font-variant-numeric: tabular-nums; letter-spacing: -.01em;
    }
    .tier-bar {
      height: 8px; background: #fff; border-radius: 8px; overflow: hidden;
      box-shadow: inset 0 0 0 1px var(--slate-200);
      position: relative;
    }
    .tier-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--red));
      border-radius: 8px;
      transition: width .55s cubic-bezier(.4,0,.2,1);
    }
    .tier-bar-fill.tier-max { background: linear-gradient(90deg, var(--green), var(--green-deep)); }
    .tier-meta { font-size: 12px; color: var(--slate-500); margin-top: 8px; line-height: 1.5; }
    .tier-meta b { color: var(--ink); font-variant-numeric: tabular-nums; font-weight: 700; }
    .tier-ticks {
      display: flex; justify-content: space-between;
      font-size: 10px; font-weight: 700; color: var(--slate-300);
      margin-top: 4px; letter-spacing: .04em;
    }
    .tier-ticks .cur { color: var(--red); }

    /* ── Sticky preview (превью-сумма) ── */
    .preview {
      position: sticky;
      bottom: 12px;
      background: var(--ink);
      color: #fff;
      padding: 14px 18px;
      border-radius: var(--r-card);
      margin: 12px 0;
      box-shadow: 0 12px 28px rgba(10,10,15,.25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }
    .preview-label {
      font-size: 11px; color: rgba(255,255,255,.55);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }
    .preview-amount {
      font-size: 22px; font-weight: 800; letter-spacing: -.02em;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .preview-amount .ru { opacity: .5; font-weight: 600; margin-left: 2px; }

    /* ── Mode switch (в шапке встречи) ── */
    .modeswitch {
      display: inline-flex;
      background: var(--slate-100);
      border-radius: 999px;
      padding: 3px;
      font-size: 12px;
    }
    .modeswitch button {
      border: none; background: transparent;
      padding: 7px 14px; border-radius: 999px;
      font-weight: 600; color: var(--slate-500);
      cursor: pointer; font-family: inherit;
      transition: background .15s, color .15s;
    }
    .modeswitch button.active {
      background: #fff; color: var(--ink);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    /* ── Animations ── */
    .fade { animation: fi .22s cubic-bezier(.2,.6,.3,1); }
    @keyframes fi { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
<style>
/* Login overlay */
.login-overlay{position:fixed;inset:0;background:#0A0A0F;color:#F7F7FA;display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-overlay.show{display:flex}
.login-card{background:#fff;color:#0A0A0F;width:100%;max-width:380px;border-radius:18px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.login-card h2{margin:0 0 6px;font-size:22px}
.login-card .sub{color:#7a7a85;font-size:13px;margin-bottom:18px}
.login-card label{display:block;font-size:13px;color:#0A0A0F;margin:10px 0 6px;font-weight:600}
.login-card select,.login-card input{width:100%;border:1px solid #E5E7EB;border-radius:14px;padding:12px 14px;font-size:15px;background:#F7F7FA;box-sizing:border-box;font-family:inherit}
.login-card select:focus,.login-card input:focus{outline:2px solid #EF3124;background:#fff}
.login-card button{width:100%;background:#EF3124;color:#fff;border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:700;margin-top:18px;cursor:pointer}
.login-card button:disabled{opacity:.5;cursor:wait}
.login-err{color:#EF3124;font-size:13px;margin-top:10px;min-height:18px}
.logout-btn{background:transparent;border:1px solid rgba(247,247,250,.3);color:#F7F7FA;border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;margin-left:8px}
.user-pill{font-size:11px;color:rgba(247,247,250,.7);margin-top:2px}
</style>
</head>
<body>

<!-- Экран логина (поверх приложения) -->
<div id="login" class="login-overlay">
  <div class="login-card">
    <h2>Alfa Tracker</h2>
    <div class="sub">Войдите, чтобы продолжить</div>
    <label for="li-fio">Сотрудник</label>
    <select id="li-fio"><option value="">— выберите ФИО —</option></select>

    <button id="li-btn" onclick="doLogin()">Войти</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<header>
  <div>
    <h1>Alfa <b>Tracker</b></h1>
    <div class="hmeta" id="hdate"></div>
    <div class="user-pill" id="hsuser"></div>
  </div>
  <div>
    <button class="hback" id="hback" onclick="goBack()">← Назад</button>
    <button class="logout-btn" id="hlogout" onclick="doLogout()" style="display:none">Выход</button>
  </div>
</header>

<div class="wrap"><div id="root" class="fade"></div></div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════════════════
function newMeeting() {
  return {
    id: Date.now(), date: today(),
    clientName: '',
    // DC (дебетовые карты)
    F:0,G:0,H:0,I:0,J:0,K:0,L:0,  // ДК,Х5,ИНВ,RE,СНВ,Семейный,ДК+Детская
    E:0,  // sum DC
    M:0, N:0,  // DC акт, ТР
    // КК
    O:0, P:0, Q:0, R:0,  // КК1,КК2, акт, ТР
    // Селфи (Self)
    AC:0,AD:0,AE:0,  // n2b, ВБ, НБ
    AF:0,AG:0,  // Self акт, ТР
    // Специальные
    AI:0,  // Установка МП
    AK:0,  // НК
    AP:0,  // УП / Отказ банка
    // Кросс
    X:0, Y:0,  // КЛ/ККК выбран / с ТР+
    T:0, V:0, W:0,  // ИИС к ДК: выбран, акт, ТР
    AJ:0, AN:0,  // Кросс СИМ, Кросс Детская
    // Доп. продажи
    Z:0,  // Инвесткопилка
    AA:0, // БС
    AB:0, // ЦП
    AO:0, // Вок
    S:0,  // ФЗ КК1
    CO:0, // УП (кросс)
    AL:0,AM:0,AQ:0,AR:0,AS:0,AT:0,AU:0, // прочие
    // Приложение
    AH:null, CL:null,
    // Флаги

    primaryType:null, crossType:null,
    // Итог
    AV:0,

    awStack:[]

// ═══════════════════════════════════════════════════════
//  БС — ТИРАЖИРОВАННАЯ СТАВКА (по месячному итогу)
// ═══════════════════════════════════════════════════════
function bsRate(totalBS) {
  if (totalBS >= 21) return 570;
  if (totalBS >= 11) return 430;
  return 270;
}

function monthlyBSTotal() {
  const now = new Date();
  return history
    .filter(h => h.AW === 'COMPLETED')
    .filter(h => {
      const p = (h.date || '').split('.');
      if (p.length === 3 && !isNaN(+p[1]) && !isNaN(+p[2])) {
        return +p[1] === now.getMonth() + 1 && +p[2] === now.getFullYear();
      }
      const d = new Date(h.id);
      return !isNaN(d) && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    })
    .reduce((s, h) => s + (h.AA || 0), 0);
}

// ═══════════════════════════════════════════════════════
//  РАСЧЁТ ВОЗНАГРАЖДЕНИЯ
// ═══════════════════════════════════════════════════════
function calcEarnings(m, forceBSRate) {
  const rate = forceBSRate !== undefined
    ? forceBSRate
    : bsRate(monthlyBSTotal() + (m.AA || 0));
  // DC нерезидент (колонка J) — отдельный тариф 570/430
  const nerJ = m.J || 0;
  const nerAct = (nerJ > 0 && m.primaryType === 'DC нерезидент' && (m.AY === 1 || m.AY === 2)) ? 1 : 0;
  const dcE = m.E - nerJ;
  const dcM = m.M - nerAct;
  const r = (
    (dcE - dcM) * 270 + dcM * 310 +
    (nerJ - nerAct) * 450 + nerAct * 570 +
    (m.O + m.P - m.Q) * 450 + m.Q * 570 +
    m.S * 100 + m.T * 270 +
    m.X * 570 +
    m.Z * 270 + m.AA * rate + m.AB * 20 +
    m.AC * 430 + m.AD * 270 + m.AE * 570 +
    m.AI * 310 + m.AJ * 430 + m.AK * 570 +
    m.AL * 10  + m.AM * 100 + m.AN * 270 +
    m.AP * 230 + m.AQ * 10 + m.AR * 0 +
    m.AS * 270 + m.AT * 270 + m.AU * 30 +
    m.CO * 270
  );
  return Math.round(r);
}

// API helpers — все встречи теперь хранятся на сервере
// Если страница открыта не с http://localhost:3000 (например, через file:// или Live Server),
// относительные пути типа /api/... не попадут на Express — нужен абсолютный URL.
const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:') && location.port === '3000'
  ? '' : 'http://localhost:3000';
async function apiFetch(url, opts) {
  opts = opts || {};
  opts.credentials = 'include';
  if (opts.body && typeof opts.body !== 'string') {
    opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(API_BASE + url, opts);
  if (r.status === 401) { showLogin(); throw new Error('unauthorized'); }
  if (!r.ok) throw new Error('api_' + r.status);
  return r.status === 204 ? null : r.json();
}
async function loadHistory() {
  try { history = await apiFetch('/api/vstrechi'); }
  catch(e) { history = []; }
  if (!Array.isArray(history)) history = [];
}
async function apiSaveMeeting(m) {
  const res = await apiFetch('/api/vstrechi', { method:'POST', body: m });
  return res && res.id;
}
async function apiDeleteMeeting(id) {
  await apiFetch('/api/vstrechi/' + encodeURIComponent(id), { method:'DELETE' });
}
// Совместимость со старым кодом: history теперь синхронизуется через API,
// saveHistory оставлена как no-op (фактическая запись — внутри completeMtg/удаления)
function saveHistory() {}
function today() { return new Date().toLocaleDateString('ru-RU'); }

let navStack = [];
let lastCompleted = null;
let lastScreen = null;

function goBack() {
  const prev = navStack.pop();
  if (!prev || prev === 'home') { meeting = null; screen = 'home'; render(); return; }
  screen = prev;
  render();
}

function goHome()  { navStack = []; meeting = null; screen = 'home'; render(); }

function getMode() { return localStorage.getItem('alfa_mode') === 'LIST' ? 'LIST' : 'STEP'; }
function setMode(m) { localStorage.setItem('alfa_mode', m); }

function startMtg(){
  if(navStack.length>50)navStack.shift();
  navStack.push(screen);
  meeting = newMeeting();
  meeting.AW = getMode() === 'LIST' ? 'LIST_ALL' : 'OP';
  screen = 'meeting';
  render();
}
function switchMode(m) {
  setMode(m);
  if (!meeting) return;
  // Переключаем только если ещё не начали ввод
  const empty = !meeting.primaryType && !meeting.crossType && !meeting.E && !meeting.O && !meeting.P;
  if (empty) { meeting.AW = m === 'LIST' ? 'LIST_ALL' : 'OP'; meeting.awStack = []; }
  render();
}

async function completeMtg() {
  if (!meeting) return;
  const hasAny = meeting.primaryType || meeting.E > 0 || meeting.O > 0 || meeting.P > 0 || meeting.AA > 0;
  if (!hasAny && !confirm('Сохранить пустую встречу?')) return;
  meeting.date = today();
  meeting.E  = meeting.F+meeting.G+meeting.H+meeting.I+meeting.J+meeting.K+meeting.L;
  meeting.AV = calcEarnings(meeting);
  meeting.AW = 'COMPLETED';
  meeting.status = 'COMPLETED';
  meeting.completedAt = new Date().toISOString();
  lastCompleted = JSON.parse(JSON.stringify(meeting));
  try {
    const id = await apiSaveMeeting(lastCompleted);
    if (id) lastCompleted.id = id;
    history.push(lastCompleted);
  } catch (e) {
    alert('Не удалось сохранить встречу на сервере: ' + e.message);
    return;
  }
  screen = 'result';
  render();
}

function setStage(s) { if (meeting) { meeting.AW = s; render(); } }
function goStage(s) {
  if (!meeting) return;
  meeting.awStack = meeting.awStack || [];
  const {awStack, ...rest} = meeting;
  meeting.awStack.push({aw: meeting.AW, snapshot: JSON.parse(JSON.stringify(rest))});
  meeting.AW = s;
  render();
}
function backStage() {
  if (!meeting) return;
  meeting.awStack = meeting.awStack || [];
  if (meeting.awStack.length) {
    const entry = meeting.awStack.pop();
    const remainingStack = meeting.awStack.slice();
    meeting = Object.assign({}, entry.snapshot);
    meeting.awStack = remainingStack;
    render();
  } else goBack();
}

function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='cls') e.className=v;
    else if (k==='on') e.onclick=v;
    else if (k==='css') e.style.cssText=v;
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for (const k of kids) {
    if (k==null) continue;
    e.append(typeof k==='string' ? document.createTextNode(k) : k);
  }
  return e;
}

function btn(txt, onClick, cls='') {
  return el('button',{cls:`btn ${cls}`,on:onClick},txt);
}
function grid(cols, btns) {
  const g = el('div',{cls:`grid g${cols}`});
  btns.filter(Boolean).forEach(b=>g.append(b));
  return g;
}
function card(title, ...kids) {
  const c = el('div',{cls:'card fade'});
  if (title) c.append(el('div',{cls:'card-title'},title));
  kids.filter(Boolean).forEach(k=>c.append(k));
  return c;
}
function badge(txt) { return el('div',{cls:'step-badge'},txt); }
function desc(txt)  { return el('p',{cls:'card-desc'},txt); }
function rrow(lbl,val) {
  return el('div',{cls:'rrow'},
    el('span',{cls:'rlabel'},lbl),
    el('span',{cls:'rval'},String(val)));
}

  const m = n % 10, m100 = n % 100;
  if (m100 >= 11 && m100 <= 14) return 'встреч';
  if (m === 1) return 'встреча';
  if (m >= 2 && m <= 4) return 'встречи';
  return 'встреч';
}

function legacyCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  if (!ok) alert('Не удалось скопировать');
}

function renderDailyCard(mtgs, mBS, mRate) {
  const t = {count: mtgs.length};
  const keys = 'E,O,P,Q,M,N,R,S,T,U,V,W,X,Y,Z,AA,AB,AC,AD,AE,AF,AG,AI,AJ,AK,AL,AM,AN,AO,AP,AQ,AR,AS,AT,AU,AV'.split(',');
  keys.forEach(k => { t[k] = mtgs.reduce((s, m) => s + (m[k] || 0), 0); });
  t.AV = mtgs.reduce((s, m) => s + calcEarnings(m, mRate), 0);

  const rows = [
    ['Всего встреч',    t.count],
    ['DC',              t.E],
    ['CC1',             t.O],
    ['ТЗ CC1',          t.R],
    ['ФЗ CC1',          t.S],
    ['КДК к ДК',        t.T],
    ['ТЗ КДК',          t.W],
    ['Комбо',           t.AU],
    ['ЦП',              t.AB],
    ['БС',              t.AA],
    ['Инвесткопилка',   t.Z],
    ['Установка МП Х5', t.AR],
    ['Селфи N2B',       t.AC],
    ['Селфи OLD',       t.AD + t.AE],
    ['ТЗ Селфи',        t.AG],
    ['Кросс Кидс',      t.AN],
    ['Кросс СИМ',       t.AJ],
    ['Пенсия',          t.AT],
    ['Смарт',           t.AQ],
    ['ПДС',             t.AS],
    ['Кэш',             t.AL],
    ['Вок на встрече',  t.AO],
  ];
  const fmt = v => v > 0 ? String(v) : '—';

  const c = card(null);
  c.style.padding = '6px 18px 14px';

  // Аккордеон
  const acc = el('div',{cls:'acc'});
  const head = el('button',{cls:'acc-head',on:()=>acc.classList.toggle('open')});
  head.append(
    el('span',{},`Детализация · ${mtgs.length} ${meetingsWord(mtgs.length)}`),
    el('span',{cls:'acc-arr'},'▾')
  );
  acc.append(head);

  const body = el('div',{cls:'acc-body'});
  const inner = el('div',{cls:'acc-inner'});

  // БС-тир с прогресс-баром (показываем всегда, если есть БС в месяце)
  if (mBS > 0 || t.AA > 0) {
    const tier = el('div',{cls:'tier'});
    const isMax = mRate === 570;
    const nextBoundary = mRate === 270 ? 11 : 21;
    const pct = isMax ? 100 : Math.min(100, Math.round((mBS / nextBoundary) * 100));

    tier.append(
      el('div',{cls:'tier-row'},
        el('span',{cls:'tier-title'},'БС в этом месяце'),
        el('span',{cls:'tier-rate'},`${mRate} ₽ / шт`)
      )
    );
    const bar = el('div',{cls:'tier-bar'});
    const fill = el('div',{cls:'tier-bar-fill' + (isMax ? ' tier-max' : '')});
    fill.style.width = pct + '%';
    bar.append(fill);
    tier.append(bar);
    tier.append(el('div',{cls:'tier-ticks'},
      el('span',{cls: mRate===270?'cur':''},'1–10 · 270₽'),
      el('span',{cls: mRate===430?'cur':''},'11–20 · 430₽'),
      el('span',{cls: mRate===570?'cur':''},'21+ · 570₽'),
    ));
    const meta = el('div',{cls:'tier-meta'});
    if (isMax) {
      meta.append('Максимальный тир. Накоплено: ', el('b',{},String(mBS)),' шт.');
    } else {
      meta.append('Накоплено ', el('b',{},String(mBS)),' шт. До следующего тира: ', el('b',{},String(nextBoundary - mBS)),' шт.');
    }
    tier.append(meta);
    inner.append(tier);
  }

  rows.forEach(([l, v]) => {
    const row = rrow(l, fmt(v));
    if (v === 0) row.style.opacity = '0.4';
    inner.append(row);
  });
  inner.append(el('div',{cls:'total'},`${(t.AV||0).toLocaleString('ru-RU')} ₽`));

  const copyBtn = btn('Скопировать итог', () => {
    const date = today();
    let text = `Отчёт за ${date}\n\n`;
    rows.forEach(([l, v]) => { text += `${l}: ${v > 0 ? v : '—'}\n`; });
    text += `\nИтоговая сумма: ${(t.AV||0).toLocaleString('ru-RU')} ₽`;
    if (t.AA > 0 || mBS > 0) text += `\n(БС тир: ${mRate}₽/шт, месяц: ${mBS} шт)`;

    const done = () => {
      copyBtn.textContent = '✓ Скопировано';
      setTimeout(() => { copyBtn.textContent = 'Скопировать итог'; }, 2000);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done).catch(() => { legacyCopy(text); done(); });
    } else { legacyCopy(text); done(); }
  }, 'btn-outline btn-full');
  inner.append(el('div',{css:'margin-top:10px'},copyBtn));

  body.append(inner);
  acc.append(body);
  c.append(acc);
  return c;
}

    'MORE_Diff_ACT_TR_1': ()=>renderActTR('Доп. продукт 1',          r=>handleMoreDiff(1,r)),
    'MORE_PRODUCT2':   ()=>renderMoreProduct(2),
    'MORE_DC_ACT_TR_2':    ()=>renderActTR('Доп. продукт 2 (DC)',     r=>handleMoreDC(2,r)),
    'MORE_Selfe_ACT_TR_2': ()=>renderActTR('Доп. продукт 2 (Селфи)', r=>handleMoreSelf(2,r)),
    'MORE_Diff_ACT_TR_2':  ()=>renderActTR('Доп. продукт 2',          r=>handleMoreDiff(2,r)),
  };

  const fn = screenFns[stage];
  if (fn) root.append(fn());

  // Кнопки навигации (всегда снизу)
  root.append(card(null,
    grid(2,[
      btn('← Назад', backStage, 'btn-gray'),
      btn('Сбросить',()=>{
        if(confirm('Сбросить текущую встречу?')){
          meeting=newMeeting();
          meeting.AW = getMode() === 'LIST' ? 'LIST_ALL' : 'OP';
          screen='meeting';render();
        }
      },'btn-danger'),
    ])
  ));
  return root;
}

/* ─── LIST ALL: Полный список ─── */
function renderListAll() {
  const m=meeting;
  const root=el('div',{});

  // ── helpers ──
  function rerender(){ render(true); }

  function clearMain(){
    ['F','G','H','I','J','K','L'].forEach(k=>m[k]=0);
    m.O=0;m.P=0;m.Q=0;m.R=0;
    m.AC=0;m.AD=0;m.AE=0;m.AF=0;m.AG=0;
    m.AI=0;m.AK=0;m.AP=0;m.CM=0;m.CN=0;
    m.M=0;m.N=0;m.AY=0;m.S=0;m.CO=0;m.primaryType=null;
  }
  function setMainAct(val){
    m.AY=val; 
    const isDC=['F','G','H','I','J','K','L'].some(k=>m[k]>0);
    const isKK=m.O>0||m.P>0;
    const isSelf=m.AC>0||m.AD>0||m.AE>0;
    if(isDC){ m.M=val>=1?1:0; m.N=val===2?1:0; }
    if(isKK){ m.Q=val>=1?1:0; m.R=val===2?1:0; }
    if(isSelf&&!isDC&&!isKK){ m.AF=val>=1?1:0; m.AG=val===2?1:0; }
    rerender();
  }
  function clearCross(){
    m.X=0;m.Y=0;m.T=0;m.V=0;m.W=0;m.AJ=0;m.AN=0;m.AZ=0;m.crossType=null;
  }
  function setCrossAct(val){
    m.AZ=val;
    if(m.crossType==='КЛ/ККК'){ m.Y=val===2?1:0; }
    else if(m.crossType==='КДК к ДК'){ m.V=val>=1?1:0; m.W=val===2?1:0; }
    rerender();
  }

  const isDC=['F','G','H','I','J','K','L'].some(k=>m[k]>0);
  const isKK=m.O>0||m.P>0;
  const isSelf=!isDC&&!isKK&&(m.AC>0||m.AD>0||m.AE>0);
  const hasCross=!!m.crossType;
  const needCrossAct=hasCross&&['КЛ/ККК','КДК к ДК','Селфи n2b','Селфи ДК','Селфи КК'].includes(m.crossType);

  function actBlock(titleTxt, val, setFn, trOnly){
    const statuses=trOnly
      ?[['ТР+',2,'btn-green'],['ТР-',0,'']]
      :[['ВА+ ТР+',2,'btn-green'],['ВА+ ТР-',1,'btn-warn'],['В+',0,'']];
    return el('div',{css:'margin-top:8px;padding:8px;background:#f9fafb;border-radius:8px'},
      el('div',{cls:'card-title',css:'margin-bottom:6px'},titleTxt),
      grid(statuses.length, statuses.map(([lbl,v,cls])=>
        btn(lbl,()=>setFn(v), val===v?(cls||'on'):'')
      ))
    );
  }

  // ── СЕКЦИЯ 1: Основной продукт ──
  const mainCard=card('Основной продукт');
  mainCard.insertBefore(badge('Шаг 1 из 4'), mainCard.firstChild.nextSibling);
  mainCard.style.marginBottom='20px';

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:4px;margin-bottom:6px'},'Дебетовые карты'));
  mainCard.append(grid(3,[
    ['ДК','F'],['Х5','G'],['DC ИНВ','H'],
    ['RE','I'],['DC нерезидент','J'],['Семейный','K'],
  ].map(([name,col])=>btn(name,()=>{
    if(m[col]>0)clearMain(); else{clearMain();m[col]=1;m.primaryType=name;}rerender();
  },m[col]>0?'on':''))));
  mainCard.append(el('div',{css:'margin-top:7px'},
    btn('ДК+Детская',()=>{
      if(m.L>0)clearMain(); else{clearMain();m.L=2;m.primaryType='ДК+Детская';}rerender();
    },m.L>0?'on btn-full':'btn-full')
  ));
  if(isDC) mainCard.append(actBlock('Статус DC', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Кредитные карты'));
  mainCard.append(grid(2,[
    btn('КК1',()=>{if(m.O>0)clearMain();else{clearMain();m.O=1;m.primaryType='КК1';}rerender();},m.O>0?'on':''),
    btn('КК2',()=>{if(m.O>0){m.P=m.P?0:1;}else if(m.P>0){clearMain();}else{clearMain();m.P=1;m.primaryType='КК2';}rerender();},m.P>0?'on':''),
  ]));
  if(isKK) mainCard.append(actBlock('Статус КК', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Селфи'));
  mainCard.append(grid(3,[
    btn('n2b',()=>{if(m.AC>0&&m.primaryType==='Селфи n2b')clearMain();else{clearMain();m.AC=1;m.primaryType='Селфи n2b';}rerender();},m.primaryType==='Селфи n2b'?'on':''),
    btn('ДК', ()=>{if(m.AD>0&&m.primaryType==='Селфи ДК')clearMain();else{clearMain();m.AD=1;m.primaryType='Селфи ДК';}rerender();},m.primaryType==='Селфи ДК'?'on':''),
    btn('КК', ()=>{if(m.AE>0&&m.primaryType==='Селфи КК')clearMain();else{clearMain();m.AE=1;m.primaryType='Селфи КК';}rerender();},m.primaryType==='Селфи КК'?'on':''),
  ]));
  if(isSelf) mainCard.append(actBlock('Статус Селфи', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Специальные'));
  mainCard.append(grid(2,[
    btn('КН',      ()=>{if(m.AK>0)clearMain();else{clearMain();m.AK=1;m.primaryType='КН';m.CM=1;}rerender();},m.AK>0?'on':''),
    btn('Уст. МП', ()=>{if(m.AI>0)clearMain();else{clearMain();m.AI=1;m.primaryType='Установка МП';m.CM=1;}rerender();},m.AI>0?'on':''),
  ]));
  mainCard.append(el('div',{css:'margin-top:7px'},
    btn('Отказ банка',()=>{
      if(m.AP>0&&m.CN>0)clearMain();
      else{clearMain();m.AP=1;m.CN=1;m.CM=1;m.primaryType='Отказ банка';}
      rerender();
    },(m.AP>0&&m.CN>0?'btn-danger on':'btn-danger')+' btn-full')
  ));

  root.append(mainCard);

  // ── СЕКЦИЯ 2: Кросс продукт ──
  const crossCard=card('Кросс продукт');
  crossCard.insertBefore(badge('Шаг 2 из 4'), crossCard.firstChild.nextSibling);
  crossCard.style.marginBottom='20px';
  crossCard.append(grid(2,[
    btn('КЛ/ККК',()=>{if(m.crossType==='КЛ/ККК')clearCross();else{clearCross();m.X=1;m.crossType='КЛ/ККК';}rerender();},m.crossType==='КЛ/ККК'?'on':''),
    btn('КДК к ДК',()=>{if(m.crossType==='КДК к ДК')clearCross();else{clearCross();m.T=1;m.crossType='КДК к ДК';}rerender();},m.crossType==='КДК к ДК'?'on':''),
    btn('Селфи n2b',()=>{if(m.crossType==='Селфи n2b'){const prev=m.AC;clearCross();m.AC=Math.max(0,prev-1);}else{clearCross();m.AC++;m.crossType='Селфи n2b';}rerender();},m.crossType==='Селфи n2b'?'on':''),
    btn('Селфи ДК', ()=>{if(m.crossType==='Селфи ДК'){const prev=m.AD;clearCross();m.AD=Math.max(0,prev-1);}else{clearCross();m.AD++;m.crossType='Селфи ДК';}rerender();},m.crossType==='Селфи ДК'?'on':''),
    btn('Селфи КК', ()=>{if(m.crossType==='Селфи КК'){const prev=m.AE;clearCross();m.AE=Math.max(0,prev-1);}else{clearCross();m.AE++;m.crossType='Селфи КК';}rerender();},m.crossType==='Селфи КК'?'on':''),
    btn('Кросс СИМ',()=>{if(m.crossType==='Кросс СИМ')clearCross();else{clearCross();m.AJ=1;m.crossType='Кросс СИМ';}rerender();},m.crossType==='Кросс СИМ'?'on':''),
    btn('Кросс Дет.',()=>{if(m.crossType==='Кросс Детская')clearCross();else{clearCross();m.AN=1;m.crossType='Кросс Детская';}rerender();},m.crossType==='Кросс Детская'?'on':''),
  ]));
  if(needCrossAct) crossCard.append(actBlock('Статус кросса', m.AZ, setCrossAct, m.crossType==='КЛ/ККК'));
  root.append(crossCard);

  // ── СЕКЦИЯ 3: Доп. продажи ──
  const esCard=card('Доп. продажи');
  esCard.insertBefore(badge('Шаг 3 из 4'), esCard.firstChild.nextSibling);
  esCard.style.marginBottom='20px';
  const esItems=[
    ['БС','AA'],['Инвест.','Z'],['ЦП','AB'],['Вок','AO'],
    ['Смарт','AQ'],['Комбо 1Р','AU'],['Кэш','AL'],['Защитник','AM'],
    ['ПДС','AS'],['Пенсия','AT'],['Уст.МП Х5','AR'],
  ];
  const esG=el('div',{cls:'grid g3'});
  esItems.forEach(([lbl,col])=>{
    esG.append(btn(lbl,()=>{m[col]=m[col]?0:1;rerender();},m[col]?'on':''));
  });
  esCard.append(esG);
  if(isKK){
    esCard.append(el('div',{cls:'card-title',css:'margin-top:10px;margin-bottom:6px'},'Только для КК'));
    esCard.append(grid(2,[
      btn('ФЗ CC1',()=>{m.S=m.S?0:1;rerender();},m.S?'on':''),
      btn('УП',()=>{m.CO=m.CO?0:1;rerender();},m.CO?'on':''),
    ]));
  }
  root.append(esCard);

  // ── СЕКЦИЯ 4: Приложение ──
  const appCard=card('Приложение');
  appCard.insertBefore(badge('Шаг 4 из 4'), appCard.firstChild.nextSibling);
  appCard.style.marginBottom='20px';
  appCard.append(grid(2,[
    btn('Android ✓',()=>{m.CL=1;m.AH=1;rerender();},m.CL===1&&m.AH===1?'btn-green':''),
    btn('Android ✗',()=>{m.CL=1;m.AH=0;rerender();},m.CL===1&&m.AH===0?'on':''),
    btn('iPhone ✓', ()=>{m.CL=0;m.AH=1;rerender();},m.CL===0&&m.AH===1?'btn-green':''),
    btn('iPhone ✗', ()=>{m.CL=0;m.AH=0;rerender();},m.CL===0&&m.AH===0?'on':''),
  ]));
  root.append(appCard);

  root.append(card(null,
    btn('✅  Завершить встречу', completeMtg, 'btn-red btn-full')
  ));

  return root;
}

function pickDC(name,col,count=1) {
  meeting[col]=(meeting[col]||0)+count;
  meeting.primaryType=name;
  goStage('DC_ACT_TR');
}
function pickKK(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  goStage('KK_ACT_TR');
}
function pickSelf(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  goStage('Self_ACT_TR');
}
function pickSpecial(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  meeting.CM=1;
  goStage('AFTER_APP');
}
function pickRefusal() {
  meeting.AP=1; meeting.CN=1; meeting.CM=1;
  meeting.primaryType='Отказ банка';
  goStage('AFTER_APP');
}

function handleDC(r) {
  if(r==='ВА+ ТР+'){ meeting.M++; meeting.N++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.M++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleKK(r) {
  if(r==='ВА+ ТР+'){ meeting.Q++; meeting.R++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.Q++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleSelf(r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.AF++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleKL(r) {
  if(r==='ТР+'){ meeting.Y++; meeting.AZ=2; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleKDK(r) {
  if(r==='ВА+ ТР+'){ meeting.V++; meeting.W++; meeting.AZ=2; }
  else if(r==='ВА+ ТР-'){ meeting.V++; meeting.AZ=1; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleSelf2(r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; meeting.AZ=2; }
  else if(r==='ВА+ ТР-'){ meeting.AF++; meeting.AZ=1; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleDiff(r) {
  if(r==='ВА+ ТР+') meeting.AZ=2;
  else if(r==='ВА+ ТР-') meeting.AZ=1;
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}

    btn('Android  ✓', ()=>{ meeting.CL=1; meeting.AH=1; goStage('AFTER_APP'); }),
    btn('Android  ✗', ()=>{ meeting.CL=1; meeting.AH=0; goStage('AFTER_APP'); }),
    btn('iPhone  ✓',  ()=>{ meeting.CL=0; meeting.AH=1; goStage('AFTER_APP'); }),
    btn('iPhone  ✗',  ()=>{ meeting.CL=0; meeting.AH=0; goStage('AFTER_APP'); }),
  ]));
  return c;
}

/* ─── AFTER APP: завершение / доп. продукты ─── */
function renderAfterApp() {
  const m=meeting;
  const wrap = el('div',{});
  const c=card('Встреча завершена?');

  // Мини-сводка
  const chips=el('div',{cls:'chips'});
  if(m.primaryType) chips.append(el('span',{cls:'chip red'},`📌 ${m.primaryType}`));
  if(m.crossType)   chips.append(el('span',{cls:'chip'},`🔗 ${m.crossType}`));
  if(m.moreProduct1Type) chips.append(el('span',{cls:'chip'},`➕ ${m.moreProduct1Type}`));
  if(m.moreProduct2Type) chips.append(el('span',{cls:'chip'},`➕ ${m.moreProduct2Type}`));
  const extras=[];
  if(m.AA)extras.push('БС'); if(m.Z)extras.push('Инвест.'); if(m.AB)extras.push('ЦП');
  if(m.AO)extras.push('Вок'); if(m.S)extras.push('ФЗ CC1'); if(m.CO)extras.push('УП');
  if(m.AL)extras.push('Кэш'); if(m.AM)extras.push('Защитник'); if(m.AQ)extras.push('Смарт');
  if(m.AS)extras.push('ПДС'); if(m.AT)extras.push('Пенсия'); if(m.AU)extras.push('Комбо 1Р');
  extras.forEach(e=>chips.append(el('span',{cls:'chip'},e)));
  if(chips.children.length) c.append(chips);

  c.append(el('div',{css:'margin-bottom:7px'},
    btn('✅  Завершить встречу', completeMtg, 'btn-red btn-full')
  ));

  // Ещё продукт (только если не было 2 доп. продукта)
  if (!m.moreProduct1Type) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('➕  Ещё продукт', ()=>goStage('MORE_PRODUCT1'),'btn-outline btn-full')
    ));
  } else if (!m.moreProduct2Type) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('➕  Добавить ещё', ()=>goStage('MORE_PRODUCT2'),'btn-outline btn-full')
    ));
  }

  // Если спец. продукт — показываем «Продажи»
  if (m.CM && !m.primaryType?.includes('Отказ')) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('💼  Доп. продажи', ()=>goStage('EXTRA_SALES_0'),'btn-outline btn-full')
    ));
  }

  wrap.append(c);

  // Превью-сумма (sticky внизу)
  const previewSum = calcEarnings(m);
  const preview = el('div',{cls:'preview'});
  preview.append(
    el('div',{},
      el('div',{cls:'preview-label'},'Текущая сумма'),
      el('div',{cls:'preview-amount'},previewSum.toLocaleString('ru-RU'),el('span',{cls:'ru'},' ₽'))
    ),
    el('div',{css:'font-size:22px;opacity:.5'},'→')
  );
  wrap.append(preview);

  return wrap;
}

/* ─── MORE PRODUCTS ─── */
function renderMoreProduct(num) {
  const c=card(`Дополнительный продукт ${num}`);
  c.append(desc(`Выберите ${num===1?'первый':'второй'} дополнительный продукт:`));
  c.append(grid(3,[
    btn('DC',            ()=>pickMore(num,'DC','F','dc')),
    btn('DC X5',         ()=>pickMore(num,'DC X5','G','dc')),
    btn('Селфи n2b',   ()=>pickMore(num,'Селфи n2b','AC','self')),
    btn('Селфи ДК',    ()=>pickMore(num,'Селфи ДК','AD','self')),
    btn('Селфи КК',    ()=>pickMore(num,'Селфи КК','AE','self')),
    btn('Кросс СИМ',    ()=>pickMore(num,'Кросс СИМ','AJ','diff')),
    btn('Кросс Детская',()=>pickMore(num,'Кросс Детская','AN','diff')),
  ]));
  return c;
}
function pickMore(num,name,col,type) {
  meeting[col]=(meeting[col]||0)+1;
  if(num===1){ meeting.moreProduct1Type=name; }
  else       { meeting.moreProduct2Type=name; }
  const exact = {
    dc:   { 1:'MORE_DC_ACT_TR_1',    2:'MORE_DC_ACT_TR_2'    },
    self: { 1:'MORE_Self_ACT_TR_1',  2:'MORE_Selfe_ACT_TR_2' },
    diff: { 1:'MORE_Diff_ACT_TR_1',  2:'MORE_Diff_ACT_TR_2'  },
  };
  goStage(exact[type][num]);
}

function handleMoreDC(num,r) {
  if(r==='ВА+ ТР+'){ meeting.M++; meeting.N++; num===1?(meeting.BA=2):(meeting.BB=2); }
  else if(r==='ВА+ ТР-'){ meeting.M++; num===1?(meeting.BA=1):(meeting.BB=1); }
  afterMore(num);
}
function handleMoreSelf(num,r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; num===1?(meeting.BA=2):(meeting.BB=2); }
  else if(r==='ВА+ ТР-'){ meeting.AF++; num===1?(meeting.BA=1):(meeting.BB=1); }
  afterMore(num);
}
function handleMoreDiff(num,r) {
  if(r==='ВА+ ТР+') num===1?(meeting.BA=2):(meeting.BB=2);
  else if(r==='ВА+ ТР-') num===1?(meeting.BA=1):(meeting.BB=1);
  afterMore(num);
}
function afterMore(num) {
  goStage('AFTER_APP');
}

/* ─── RESULT ─── */
function renderResult() {
  const m = lastCompleted || history[history.length-1];
  if (!m) { goHome(); return el('div',{}); }
  const root=el('div',{});
  const act=v=>v===2?'ВА+ ТР+':v===1?'ВА+ ТР-':'В+';

  const sc=card('Результат встречи');
  sc.append(el('div',{cls:'total'},`${(m.AV||0).toLocaleString('ru-RU')} ₽`));
  if(m.clientName) sc.append(rrow('Клиент', m.clientName));
  sc.append(rrow('Дата', m.date));
  if(m.primaryType) sc.append(rrow('Основной продукт', `${m.primaryType}  ·  ${act(m.AY)}`));
  if(m.crossType)   sc.append(rrow('Кросс продукт',    `${m.crossType}  ·  ${act(m.AZ)}`));
  if(m.moreProduct1Type) sc.append(rrow('Доп. продукт 1', `${m.moreProduct1Type}  ·  ${act(m.BA)}`));
  if(m.moreProduct2Type) sc.append(rrow('Доп. продукт 2', `${m.moreProduct2Type}  ·  ${act(m.BB)}`));
  root.append(sc);

  // Доп. продажи
  const extras=[];
  if(m.AA) extras.push('💰 БС (покупка)');
  if(m.Z)  extras.push('💼 Инвесткопилка');
  if(m.AB) extras.push('💳 ЦП');
  if(m.AO) extras.push('📱 Вок');
  if(m.S)  extras.push('🏷 ФЗ CC1');
  if(m.CO) extras.push('✅ УП');
  if(m.AL) extras.push('🛒 Кэш');
  if(m.AM) extras.push('🛡 Защитник');
  if(m.AQ) extras.push('💡 Смарт');
  if(m.AR) extras.push('📲 Уст.МП Х5');
  if(m.AS) extras.push('📊 ПДС');
  if(m.AT) extras.push('👴 Пенсия');
  if(m.AU) extras.push('📦 Комбо 1Р');
  if(extras.length) {
    const ec=card('Дополнительные продажи');
    extras.forEach(e=>ec.append(el('div',{css:'padding:4px 0;font-size:13px'},e)));
    root.append(ec);
  }

  // Приложение
  if (m.CL !== null && m.CL !== undefined) {
    const apc=card('Приложение');
    apc.append(rrow(m.CL===1?'Android':'iPhone', m.AH===1?'✓ Установлено':'✗ Не установлено'));
    root.append(apc);
  }

  const copyResultBtn = btn('Скопировать итог', () => {
    let text = `Встреча ${m.date}`;
    if (m.clientName) text += `\nКлиент: ${m.clientName}`;
    if (m.primaryType) text += `\nОсновной продукт: ${m.primaryType} · ${act(m.AY)}`;
    if (m.crossType)   text += `\nКросс продукт: ${m.crossType} · ${act(m.AZ)}`;
    if (m.moreProduct1Type) text += `\nДоп. продукт 1: ${m.moreProduct1Type} · ${act(m.BA)}`;
    if (m.moreProduct2Type) text += `\nДоп. продукт 2: ${m.moreProduct2Type} · ${act(m.BB)}`;
    const extCopy=[];
    if(m.AA)extCopy.push('БС'); if(m.Z)extCopy.push('Инвесткопилка');
    if(m.AB)extCopy.push('ЦП'); if(m.AO)extCopy.push('Вок');
    if(m.S)extCopy.push('ФЗ CC1'); if(m.CO)extCopy.push('УП');
    if(m.AL)extCopy.push('Кэш'); if(m.AM)extCopy.push('Защитник');
    if(m.AQ)extCopy.push('Смарт'); if(m.AR)extCopy.push('Уст.МП Х5');
    if(m.AS)extCopy.push('ПДС'); if(m.AT)extCopy.push('Пенсия');
    if(m.AU)extCopy.push('Комбо 1Р');
    if(extCopy.length) text += `\nДоп. продажи: ${extCopy.join(', ')}`;
    if(m.CL!==null&&m.CL!==undefined) text += `\nПриложение (${m.CL===1?'Android':'iPhone'}): ${m.AH===1?'✓ Установлено':'✗ Не установлено'}`;
    text += `\n\nИтог: ${(m.AV||0).toLocaleString('ru-RU')} ₽`;
    const done = () => {
      copyResultBtn.textContent = '✓ Скопировано';
      setTimeout(()=>{ copyResultBtn.textContent = 'Скопировать итог'; }, 2000);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done).catch(()=>{legacyCopy(text);done();});
    } else { legacyCopy(text); done(); }
  }, 'btn-outline btn-full');
  root.append(card(null,
    grid(1,[
      copyResultBtn,
      btn('▶  Новая встреча', startMtg, 'btn-red btn-full'),
      btn('← Главная',       goHome,   'btn-outline btn-full'),
    ])
  ));
  return root;
}

// ═══════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(keepScroll) {
  const root=document.getElementById('root');
  root.innerHTML='';
  root.className = screen !== lastScreen ? 'fade' : '';
  lastScreen = screen;
  document.getElementById('hback').style.visibility = screen === 'home' ? 'hidden' : '';
  let node;
  if      (screen==='home')    node=renderHome();
  else if (screen==='meeting') node=renderMeeting();
  else if (screen==='result')  node=renderResult();
  else                         node=renderHome();
  root.append(node);
  if (!keepScroll) window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════
//  AUTH UI
// ═══════════════════════════════════════════════════════
function showLogin() {
  document.getElementById('login').classList.add('show');
  document.getElementById('hlogout').style.display = 'none';
  document.getElementById('hsuser').textContent = '';
  populateFioSelect();
}
function hideLogin() {
  document.getElementById('login').classList.remove('show');
}
async function populateFioSelect() {
  const sel = document.getElementById('li-fio');
  if (sel.options.length > 1) return;
  try {
    const r = await fetch(API_BASE + '/api/sotrudniki');
    if (!r.ok) throw new Error('http_' + r.status);
    const list = await r.json();
    if (!Array.isArray(list) || list.length === 0) throw new Error('empty_list');
    list.forEach(fio => {
      const o = document.createElement('option');
      o.value = fio; o.textContent = fio;
      sel.appendChild(o);
    });
  } catch (e) {
    sel.options[0].textContent = '⚠ Не удалось загрузить список';
    document.getElementById('li-err').textContent = 'Сервер недоступен. Запустите: node server.js';
  }
}
async function doLogin() {
  const fio = document.getElementById('li-fio').value;
  const pwd = document.getElementById('li-pwd').value;
  const pwdWrap = document.getElementById('li-pwd-wrap');
  const err = document.getElementById('li-err');
  const btn = document.getElementById('li-btn');
  err.textContent = '';
  if (!fio) { err.textContent = 'Выберите ФИО'; return; }
  btn.disabled = true;
  try {
    const body = { fio };
    if (pwd) body.password = pwd;
    const r = await fetch(API_BASE + '/api/login', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      const j = await r.json().catch(()=>({}));
      if (j.error === 'password_required') {
        pwdWrap.style.display = '';
        document.getElementById('li-pwd').focus();
        err.textContent = 'Введите пароль администратора';
      } else if (j.error === 'invalid_password') {
        err.textContent = 'Неверный пароль';
      } else if (j.error === 'unknown_employee') {
        err.textContent = 'Сотрудник не найден';
      } else {
        err.textContent = 'Ошибка входа';
      }
      return;
    }
    currentUser = await r.json();
    document.getElementById('li-pwd').value = '';
    pwdWrap.style.display = 'none';
    hideLogin();
    await bootApp();
  } catch (e) {
    err.textContent = 'Сетевая ошибка';
  } finally {
    btn.disabled = false;
  }
}
async function doLogout() {
  try { await fetch(API_BASE + '/api/logout', { method:'POST', credentials:'include' }); } catch(e){}
  currentUser = null; history = []; meeting = null; screen = 'home'; navStack = [];
  showLogin();
}
async function bootApp() {
  document.getElementById('hlogout').style.display = '';
  if (currentUser) {
    const short = (currentUser.fio||'').split(' ').slice(0,2).join(' ');
    document.getElementById('hsuser').textContent = short + (currentUser.role==='admin'?' · admin':'');
  }
  await loadHistory();
  render();
}
document.getElementById('li-fio').addEventListener('change', () => { if (document.getElementById('li-fio').value) doLogin(); });

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.getElementById('hdate').textContent =
  new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'});

(async () => {
  try {
    const r = await fetch(API_BASE + '/api/me', { credentials:'include' });
    if (r.ok) { currentUser = await r.json(); await bootApp(); }
    else { showLogin(); }
  } catch (e) { showLogin(); }
})();
