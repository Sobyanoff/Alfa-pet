<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfa Tracker</title>
  <style>
    :root {
      --red: #e31e24; --red-dark: #b71c1c; --red-light: #fdeaea;
      --bg: #f0f2f5; --card: #fff; --text: #1a1a2e; --muted: #6b7280;
      --border: #e5e7eb; --success: #16a34a; --warn: #d97706; --danger: #dc2626;
      --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}

    /* ── Header ── */
    header{background:var(--red);color:#fff;padding:12px 16px;
           display:flex;align-items:center;justify-content:space-between;
           position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    header h1{font-size:17px;font-weight:700;letter-spacing:.3px}
    header .hdate{font-size:11px;opacity:.85;margin-top:1px}
    .hback{background:transparent;border:1.5px solid rgba(255,255,255,.7);
           color:#fff;border-radius:6px;padding:5px 10px;font-size:13px;
           cursor:pointer;white-space:nowrap}
    .hback:hover{background:rgba(255,255,255,.15)}

    /* ── Layout ── */
    .wrap{max-width:480px;margin:0 auto;padding:14px 12px 32px}

    /* ── Card ── */
    .card{background:var(--card);border-radius:var(--radius);padding:14px;
          margin-bottom:10px;box-shadow:var(--shadow)}
    .card-title{font-size:11px;font-weight:700;color:var(--muted);
                text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px}
    .step-badge{display:inline-block;background:var(--red-light);color:var(--red);
                font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;
                margin-bottom:10px}
    .card-desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5}

    /* ── Buttons ── */
    .grid{display:grid;gap:7px}
    .g2{grid-template-columns:1fr 1fr}
    .g3{grid-template-columns:1fr 1fr 1fr}
    .g1{grid-template-columns:1fr}
    .btn{padding:11px 6px;border:2px solid var(--border);background:#f9fafb;
         border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;
         text-align:center;color:var(--text);transition:all .12s;line-height:1.3}
    .btn:hover{background:#f1f5f9;border-color:#d1d5db}
    .btn:active{transform:scale(.97)}
    .btn-full{grid-column:1/-1}
    .btn-red{background:var(--red);color:#fff;border-color:var(--red)}
    .btn-red:hover{background:var(--red-dark);border-color:var(--red-dark)}
    .btn-green{background:var(--success);color:#fff;border-color:var(--success)}
    .btn-green:hover{background:#15803d}
    .btn-outline{background:transparent;border-color:var(--red);color:var(--red)}
    .btn-outline:hover{background:var(--red-light)}
    .btn-gray{background:#6b7280;color:#fff;border-color:#6b7280}
    .btn-gray:hover{background:#4b5563}
    .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-danger:hover{background:#b91c1c}
    .btn-warn{background:var(--warn);color:#fff;border-color:var(--warn)}
    .btn.on{border-color:var(--red);background:var(--red-light);color:var(--red)}
    .btn-sm{padding:7px 10px;font-size:12px}

    /* ── Result rows ── */
    .rrow{display:flex;justify-content:space-between;padding:6px 0;
          border-bottom:1px solid var(--border);font-size:14px}
    .rrow:last-child{border-bottom:none}
    .rlabel{color:var(--muted)}
    .rval{font-weight:600}
    .total{font-size:22px;font-weight:800;color:var(--red);
           text-align:center;padding:10px 0 6px}

    /* ── History ── */
    .hi{padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
    .hi:last-child{border-bottom:none}
    .hi-top{display:flex;justify-content:space-between;margin-bottom:2px}
    .hi-name{font-weight:600}
    .hi-sum{color:var(--red);font-weight:700}
    .hi-sub{color:var(--muted);font-size:12px}

    /* ── Input ── */
    input[type=text]{width:100%;padding:9px 12px;border:2px solid var(--border);
                     border-radius:8px;font-size:14px;outline:none}
    input[type=text]:focus{border-color:var(--red)}

    .empty{text-align:center;color:var(--muted);padding:20px;font-size:13px}
    .sep{height:1px;background:var(--border);margin:10px 0}

    .fade{animation:fi .18s ease}
    @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

    /* ── Summary chip ── */
    .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .chip{background:#f1f5f9;border-radius:20px;padding:3px 10px;font-size:12px;
          color:var(--text);border:1px solid var(--border)}
    .chip.red{background:var(--red-light);color:var(--red);border-color:#fca5a5}
  </style>
</head>
<body>

<header>
  <div>
    <h1>Alfa Tracker</h1>
    <div class="hdate" id="hdate"></div>
  </div>
  <button class="hback" onclick="goBack()">← Назад</button>
</header>

<div class="wrap"><div id="root" class="fade"></div></div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════════════════
function newMeeting() {
  return {
    id: Date.now(), date: today(),
    clientName: '',
    // DC (дебетовые карты)
    F:0,G:0,H:0,I:0,J:0,K:0,L:0,  // ДК,Х5,ИНВ,RE,СНВ,Семейный,ДК+Детская
    E:0,  // sum DC
    M:0, N:0,  // DC акт, ТР
    // КК
    O:0, P:0, Q:0, R:0,  // КК1,КК2, акт, ТР
    // Селфи (Self)
    AC:0,AD:0,AE:0,  // n2b, ВБ, НБ
    AF:0,AG:0,  // Self акт, ТР
    // Специальные
    AI:0,  // Установка МП
    AK:0,  // НК
    AP:0,  // УП / Отказ банка
    // Кросс
    X:0, Y:0,  // КЛ/ККК выбран / с ТР+
    T:0, V:0, W:0,  // ИИС к ДК: выбран, акт, ТР
    U:0,  // ИИС к НБ
    AJ:0, AN:0,  // Кросс СИМ, Кросс Детская
    // Доп. продажи
    Z:0,  // Инвесткопилка
    AA:0, // БС
    AB:0, // ЦП
    AO:0, // Вок
    S:0,  // ФЗ КК1
    CO:0, // УП (кросс)
    AL:0,AM:0,AQ:0,AR:0,AS:0,AT:0,AU:0, // прочие
    // Приложение
    AH:0, CL:0,
    // Флаги
    CM:0, CN:0,  // спец. продукт, отказ банка
    // Статусы активации
    AY:0,AZ:0,BA:0,BB:0,
    // Доп. продукты
    moreProduct1Type:null, moreProduct2Type:null,
    // Тип выбранных продуктов (для отображения)
    primaryType:null, crossType:null,
    // Итог
    AV:0,
    // Текущий этап
    AW:'MODE_SELECT',
    // История шагов (для кнопки ← Назад внутри встречи)
    awStack:[]
  };
}

// ═══════════════════════════════════════════════════════
//  БС — ТИРАЖИРОВАННАЯ СТАВКА (по месячному итогу)
// ═══════════════════════════════════════════════════════
function bsRate(totalBS) {
  if (totalBS >= 21) return 570;
  if (totalBS >= 11) return 430;
  return 270;
}

function monthlyBSTotal() {
  const now = new Date();
  return history
    .filter(h => h.AW === 'COMPLETED')
    .filter(h => {
      const p = h.date.split('.');
      return +p[1] === now.getMonth() + 1 && +p[2] === now.getFullYear();
    })
    .reduce((s, h) => s + (h.AA || 0), 0);
}

// ═══════════════════════════════════════════════════════
//  РАСЧЁТ ВОЗНАГРАЖДЕНИЯ
// ═══════════════════════════════════════════════════════
function calcEarnings(m, forceBSRate) {
  const rate = forceBSRate !== undefined
    ? forceBSRate
    : bsRate(monthlyBSTotal() + (m.AA || 0));
  // DC нерезидент (колонка J) — отдельный тариф 570/430
  const nerJ = m.J || 0;
  const nerAct = (nerJ > 0 && m.primaryType === 'DC нерезидент' && (m.AY === 1 || m.AY === 2)) ? 1 : 0;
  const dcE = m.E - nerJ;
  const dcM = m.M - nerAct;
  const r = (
    (dcE - dcM) * 250 + dcM * 310 +
    (nerJ - nerAct) * 450 + nerAct * 570 +
    (m.O + m.P - m.Q) * 450 + m.Q * 570 +
    m.S * 100 + m.T * 270 + m.U * 270 +
    m.X * 570 +
    m.Z * 270 + m.AA * rate + m.AB * 20 +
    m.AC * 430 + m.AD * 270 + m.AE * 570 +
    m.AI * 310 + m.AJ * 430 + m.AK * 570 +
    m.AL * 10  + m.AM * 100 + m.AN * 430 +
    m.AP * 230 + m.AQ * 30 + m.AR * 0 +
    m.AS * 270 + m.AT * 270 + m.AU * 30
  ) * 0.87;
  return Math.round(r);
}

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
let meeting = null;
let screen  = 'home';
let history;
try { history = JSON.parse(localStorage.getItem('alfa_h') || '[]'); }
catch(e) { console.warn('alfa_h corrupt, resetting:', e); history = []; }
if (!Array.isArray(history)) history = [];

function saveHistory() {
  try { localStorage.setItem('alfa_h', JSON.stringify(history)); }
  catch(e) { alert('Хранилище переполнено, очистите часть истории'); }
}
function today() { return new Date().toLocaleDateString('ru-RU'); }

let navStack = [];
let lastCompleted = null;
let lastScreen = null;

function goBack() {
  const prev = navStack.pop();
  if (!prev || prev === 'home') { meeting = null; screen = 'home'; render(); return; }
  screen = prev;
  render();
}

function goHome()  { navStack = []; meeting = null; screen = 'home'; render(); }
function startMtg(){ navStack.push(screen); meeting = newMeeting(); screen = 'meeting'; render(); }

function completeMtg() {
  if (!meeting) return;
  meeting.E  = meeting.F+meeting.G+meeting.H+meeting.I+meeting.J+meeting.K+meeting.L;
  meeting.AV = calcEarnings(meeting);
  meeting.AW = 'COMPLETED';
  history.push({...meeting});
  saveHistory();
  screen = 'result';
  render();
}

function setStage(s) { if (meeting) { meeting.AW = s; render(); } }
function goStage(s) {
  if (!meeting) return;
  meeting.awStack = meeting.awStack || [];
  meeting.awStack.push(meeting.AW);
  meeting.AW = s;
  render();
}
function backStage() {
  if (!meeting) return;
  meeting.awStack = meeting.awStack || [];
  if (meeting.awStack.length) { meeting.AW = meeting.awStack.pop(); render(); }
  else goBack();
}

// ═══════════════════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════════════════
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='cls') e.className=v;
    else if (k==='on') e.onclick=v;
    else if (k==='css') e.style.cssText=v;
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for (const k of kids) {
    if (k==null) continue;
    e.append(typeof k==='string' ? document.createTextNode(k) : k);
  }
  return e;
}

function btn(txt, onClick, cls='') {
  return el('button',{cls:`btn ${cls}`,on:onClick},txt);
}
function grid(cols, btns) {
  const g = el('div',{cls:`grid g${cols}`});
  btns.filter(Boolean).forEach(b=>g.append(b));
  return g;
}
function card(title, ...kids) {
  const c = el('div',{cls:'card fade'});
  if (title) c.append(el('div',{cls:'card-title'},title));
  kids.filter(Boolean).forEach(k=>c.append(k));
  return c;
}
function badge(txt) { return el('div',{cls:'step-badge'},txt); }
function desc(txt)  { return el('p',{cls:'card-desc'},txt); }
function rrow(lbl,val) {
  return el('div',{cls:'rrow'},
    el('span',{cls:'rlabel'},lbl),
    el('span',{cls:'rval'},String(val)));
}

// ═══════════════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════════════

/* ─── HOME ─── */
function renderHome() {
  const root = el('div',{});

  // Hero
  root.append(card(null,
    el('div',{css:'text-align:center;padding:6px 0 2px'},
      el('div',{css:'font-size:32px;margin-bottom:6px'},'📋'),
      el('div',{css:'font-size:15px;font-weight:700;margin-bottom:3px'},'Alfa Meeting Tracker'),
      el('div',{css:'font-size:12px;color:var(--muted);margin-bottom:14px'},
        'Учёт продуктов · Расчёт вознаграждения'),
      btn('▶  Начать встречу', startMtg, 'btn-red btn-full'),
    )
  ));

  // Daily report
  const todayMtgs = history.filter(m=>m.date===today()&&m.AW==='COMPLETED');
  if (todayMtgs.length) root.append(renderDailyCard(todayMtgs));

  // History
  const done = history.filter(m=>m.AW==='COMPLETED').slice().reverse();
  const hCard = card('История встреч');
  if (!done.length) {
    hCard.append(el('div',{cls:'empty'},'Встреч пока нет'));
  } else {
    done.slice(0,15).forEach(m=>{
      const parts=[]; if(m.primaryType)parts.push(m.primaryType);
      if(m.crossType)parts.push(m.crossType);
      const t=el('div',{cls:'hi'});
      const top=el('div',{cls:'hi-top'});
      top.append(
        el('span',{cls:'hi-name'},m.clientName||`${new Date(m.id).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`),
        el('span',{cls:'hi-sum'},`${m.AV}₽`)
      );
      t.append(top, el('div',{cls:'hi-sub'},`${m.date}  ·  ${parts.join(', ')||'—'}`));
      hCard.append(t);
    });
    hCard.append(el('div',{css:'margin-top:10px'},
      btn('🗑  Очистить всю историю', ()=>{
        if(confirm('Удалить всю историю встреч?')){history=[];saveHistory();render();}
      },'btn-danger btn-full btn-sm')
    ));
  }
  root.append(hCard);
  return root;
}

function legacyCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function renderDailyCard(mtgs) {
  const t = {count: mtgs.length};
  const keys = 'E,O,P,Q,M,N,R,S,T,U,X,Z,AA,AB,AC,AD,AE,AF,AG,AI,AJ,AK,AL,AM,AN,AO,AP,AQ,AR,AS,AT,AU,AV'.split(',');
  keys.forEach(k => { t[k] = mtgs.reduce((s, m) => s + (m[k] || 0), 0); });

  const rows = [
    ['Всего встреч',    t.count],
    ['DC',              t.E],
    ['CC1',             t.O],
    ['ТЗ CC1',          t.R],
    ['ФЗ CC1',          t.S],
    ['КДК к CC',        0],
    ['ТЗ КДК',          0],
    ['Комбо',           t.AU],
    ['ТЗ Комбо',        0],
    ['Комбо 1₽',        0],
    ['ЦП',              t.AB],
    ['БС',              t.AA],
    ['Инвесткопилка',   t.Z],
    ['Установка МП Х5', t.AR],
    ['Селфи N2B',       t.AC],
    ['Селфи OLD',       t.AD + t.AE],
    ['ТЗ Селфи',        t.AG],
    ['Кросс Кидс',      t.AN],
    ['Кросс СИМ',       t.AJ],
    ['Пенсия',          t.AT],
    ['Смарт',           t.AQ],
    ['ПДС',             t.AS],
    ['Кэш',             t.AL],
    ['Вок на встрече',  t.AO],
  ];

  // Пересчёт итога по месячному тиру БС
  const mBS = monthlyBSTotal();
  const mRate = bsRate(mBS);
  t.AV = mtgs.reduce((s, m) => s + calcEarnings(m, mRate), 0);

  const fmt = v => v > 0 ? String(v) : '-';

  const c = card('Итог за сегодня');

  // Индикатор тира БС
  if (t.AA > 0) {
    const tierLabel = mRate === 570 ? '🔥 БС тир 21+ → 570₽/шт'
                    : mRate === 430 ? '⚡ БС тир 11–20 → 430₽/шт'
                    :                 '📊 БС тир 1–10 → 270₽/шт';
    const tierColor = mRate === 570 ? 'var(--success)' : mRate === 430 ? 'var(--warn)' : 'var(--muted)';
    c.append(el('div', {
      css: `font-size:12px;font-weight:600;color:${tierColor};margin-bottom:8px;padding:4px 8px;background:#f9fafb;border-radius:6px;display:inline-block`
    }, `${tierLabel}  (всего в месяце: ${mBS} шт)`));
  }

  rows.forEach(([l, v]) => {
    const row = rrow(l, fmt(v));
    if (v === 0) row.style.opacity = '0.45';
    c.append(row);
  });
  c.append(el('div', {cls: 'total'}, `${t.AV}₽`));

  const copyBtn = btn('📋  Скопировать итог', () => {
    const date = today();
    let text = `📊 Отчёт за: ${date}\n\n`;
    rows.forEach(([l, v]) => { text += `${l}: ${v > 0 ? v : '-'}\n`; });
    text += `\nИтоговая сумма: ${t.AV}₽`;
    if (t.AA > 0) text += `\n(БС тир: ${mRate}₽/шт, месяц: ${mBS} шт)`;

    const done = () => {
      copyBtn.textContent = '✅  Скопировано!';
      setTimeout(() => { copyBtn.textContent = '📋  Скопировать итог'; }, 2000);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done).catch(() => { legacyCopy(text); done(); });
    } else { legacyCopy(text); done(); }
  }, 'btn-outline btn-full');

  c.append(el('div', {css: 'margin-top:10px'}, copyBtn));
  return c;
}

/* ─── MEETING WRAPPER ─── */
function renderMeeting() {
  const m = meeting;
  const root = el('div',{});

  // Клиент (только на первом шаге)
  if (m.AW==='OP') {
    const nc=card('Клиент (необязательно)');
    const inp=el('input',{type:'text',placeholder:'Имя клиента...',value:m.clientName});
    inp.addEventListener('input',e=>m.clientName=e.target.value);
    nc.append(inp);
    root.append(nc);
  }

  const stage = m.AW;
  const screenFns = {
    'MODE_SELECT':     renderModeSelect,
    'LIST_ALL':        renderListAll,
    'OP':              renderOP,
    'DC_ACT_TR':       ()=>renderActTR('Активация / транзакция (DC)',     handleDC),
    'KK_ACT_TR':       ()=>renderActTR('Активация / транзакция (CC)',     handleKK),
    'Self_ACT_TR':     ()=>renderActTR('Активация / транзакция (Селфи)', handleSelf),
    'CP':              renderCP,
    'KL_ACT_TR':       ()=>renderTRonly('КЛ/ККК — была транзакция?',      handleKL),
    'KDK_ACT_TR':      ()=>renderActTR('Активация / транзакция (ИИС)',     handleKDK),
    'Self_ACT_TR_2':   ()=>renderActTR('Активация / транзакция (Селфи)', handleSelf2),
    'Diff_ACT_TR':     ()=>renderActTR('Активация / транзакция (кросс)',   handleDiff),
    'EXTRA_SALES_0':   renderES0,
    'EXTRA_SALES_1':   renderES1,
    'EXTRA_SALES_2':   renderES2,
    'EXTRA_SALES_3':   renderES3,
    'APP':             renderApp,
    'AFTER_APP':       renderAfterApp,
    'MORE_PRODUCT1':   ()=>renderMoreProduct(1),
    'MORE_DC_ACT_TR_1':   ()=>renderActTR('Доп. продукт 1 (DC)',     r=>handleMoreDC(1,r)),
    'MORE_Self_ACT_TR_1': ()=>renderActTR('Доп. продукт 1 (Селфи)', r=>handleMoreSelf(1,r)),
    'MORE_Diff_ACT_TR_1': ()=>renderActTR('Доп. продукт 1',          r=>handleMoreDiff(1,r)),
    'MORE_PRODUCT2':   ()=>renderMoreProduct(2),
    'MORE_DC_ACT_TR_2':    ()=>renderActTR('Доп. продукт 2 (DC)',     r=>handleMoreDC(2,r)),
    'MORE_Selfe_ACT_TR_2': ()=>renderActTR('Доп. продукт 2 (Селфи)', r=>handleMoreSelf(2,r)),
    'MORE_Diff_ACT_TR_2':  ()=>renderActTR('Доп. продукт 2',          r=>handleMoreDiff(2,r)),
  };

  const fn = screenFns[stage];
  if (fn) root.append(fn());

  // Кнопки отмены (всегда снизу)
  root.append(card(null,
    grid(2,[
      btn('🗑 Удалить встречу',()=>{
        if(confirm('Сбросить текущую встречу?')){meeting=newMeeting();screen='meeting';render();}
      },'btn-danger'),
      btn('← Назад', backStage, 'btn-gray'),
    ])
  ));
  return root;
}

/* ─── MODE SELECT ─── */
function renderModeSelect() {
  const c=card('Режим встречи');
  c.append(desc('Выберите способ ввода данных:'));
  c.append(grid(1,[

/* ─── LIST ALL: Полный список ─── */
function renderListAll() {
  const m=meeting;
  const root=el('div',{});

  // ── helpers ──
  function rerender(){ render(true); }

  function clearMain(){
    ['F','G','H','I','J','K','L'].forEach(k=>m[k]=0);
    m.O=0;m.P=0;m.Q=0;m.R=0;
    m.AC=0;m.AD=0;m.AE=0;m.AF=0;m.AG=0;
    m.AI=0;m.AK=0;m.AP=0;m.CM=0;m.CN=0;
    m.M=0;m.N=0;m.AY=0;m.primaryType=null;
  }
  function setMainAct(val){
    m.AY=val;
    const isDC=['F','G','H','I','J','K','L'].some(k=>m[k]>0);
    const isKK=m.O>0||m.P>0;
    const isSelf=m.AC>0||m.AD>0||m.AE>0;
    if(isDC){ m.M=val>=1?1:0; m.N=val===2?1:0; }
    if(isKK){ m.Q=val>=1?1:0; m.R=val===2?1:0; }
    if(isSelf&&!isDC&&!isKK){ m.AF=val>=1?1:0; m.AG=val===2?1:0; }
    rerender();
  }
  function clearCross(){
    m.X=0;m.Y=0;m.T=0;m.V=0;m.W=0;m.AJ=0;m.AN=0;m.AZ=0;m.crossType=null;
  }
  function setCrossAct(val){
    m.AZ=val;
    if(m.crossType==='КЛ/ККК'){ m.Y=val===2?1:0; }
    else if(m.crossType==='КДК к ДК'){ m.V=val>=1?1:0; m.W=val===2?1:0; }
    rerender();
  }

  const isDC=['F','G','H','I','J','K','L'].some(k=>m[k]>0);
  const isKK=m.O>0||m.P>0;
  const isSelf=!isDC&&!isKK&&(m.AC>0||m.AD>0||m.AE>0);
  const hasCross=!!m.crossType;
  const needCrossAct=hasCross&&['КЛ/ККК','КДК к ДК','Селфи n2b','Селфи ДК','Селфи КК'].includes(m.crossType);

  function actBlock(titleTxt, val, setFn, trOnly){
    const statuses=trOnly
      ?[['ТР+',2,'btn-green'],['ТР-',0,'']]
      :[['ВА+ ТР+',2,'btn-green'],['ВА+ ТР-',1,'btn-warn'],['В+',0,'']];
    return el('div',{css:'margin-top:8px;padding:8px;background:#f9fafb;border-radius:8px'},
      el('div',{cls:'card-title',css:'margin-bottom:6px'},titleTxt),
      grid(statuses.length, statuses.map(([lbl,v,cls])=>
        btn(lbl,()=>setFn(v), val===v?(cls||'on'):'')
      ))
    );
  }

  // ── СЕКЦИЯ 1: Основной продукт ──
  const mainCard=card('Основной продукт');
  mainCard.insertBefore(badge('Шаг 1 из 4'), mainCard.firstChild.nextSibling);
  mainCard.style.marginBottom='20px';

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:4px;margin-bottom:6px'},'Дебетовые карты'));
  mainCard.append(grid(3,[
    ['ДК','F'],['Х5','G'],['DC ИНВ','H'],
    ['RE','I'],['DC нерез.','J'],['Семейный','K'],
  ].map(([name,col])=>btn(name,()=>{
    if(m[col]>0)clearMain(); else{clearMain();m[col]=1;m.primaryType=name;}rerender();
  },m[col]>0?'on':''))));
  mainCard.append(el('div',{css:'margin-top:7px'},
    btn('ДК+Детская',()=>{
      if(m.L>0)clearMain(); else{clearMain();m.L=2;m.primaryType='ДК+Детская';}rerender();
    },m.L>0?'on btn-full':'btn-full')
  ));
  if(isDC) mainCard.append(actBlock('Статус DC', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Кредитные карты'));
  mainCard.append(grid(2,[
    btn('КК1',()=>{if(m.O>0)clearMain();else{clearMain();m.O=1;m.primaryType='КК1';}rerender();},m.O>0?'on':''),
    btn('КК2',()=>{if(m.P>0)clearMain();else{clearMain();m.P=1;m.primaryType='КК2';}rerender();},m.P>0?'on':''),
  ]));
  if(isKK) mainCard.append(actBlock('Статус КК', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Селфи'));
  mainCard.append(grid(3,[
    btn('n2b',()=>{if(m.AC>0&&m.primaryType==='Селфи n2b')clearMain();else{clearMain();m.AC=1;m.primaryType='Селфи n2b';}rerender();},m.primaryType==='Селфи n2b'?'on':''),
    btn('ДК', ()=>{if(m.AD>0&&m.primaryType==='Селфи ДК')clearMain();else{clearMain();m.AD=1;m.primaryType='Селфи ДК';}rerender();},m.primaryType==='Селфи ДК'?'on':''),
    btn('КК', ()=>{if(m.AE>0&&m.primaryType==='Селфи КК')clearMain();else{clearMain();m.AE=1;m.primaryType='Селфи КК';}rerender();},m.primaryType==='Селфи КК'?'on':''),
  ]));
  if(isSelf) mainCard.append(actBlock('Статус Селфи', m.AY, setMainAct, false));

  mainCard.append(el('div',{cls:'card-title',css:'margin-top:12px;margin-bottom:6px'},'Специальные'));
  mainCard.append(grid(2,[
    btn('КН',      ()=>{if(m.AK>0)clearMain();else{clearMain();m.AK=1;m.primaryType='КН';m.CM=1;}rerender();},m.AK>0?'on':''),
    btn('Уст. МП', ()=>{if(m.AI>0)clearMain();else{clearMain();m.AI=1;m.primaryType='Установка МП';m.CM=1;}rerender();},m.AI>0?'on':''),
  ]));
  mainCard.append(el('div',{css:'margin-top:7px'},
    btn('Отказ банка',()=>{
      if(m.AP>0&&m.CN>0)clearMain();
      else{clearMain();m.AP=1;m.CN=1;m.CM=1;m.primaryType='Отказ банка';}
      rerender();
    },(m.AP>0&&m.CN>0?'btn-danger':'btn-danger')+' btn-full')
  ));

  root.append(mainCard);

  // ── СЕКЦИЯ 2: Кросс продукт ──
  const crossCard=card('Кросс продукт');
  crossCard.insertBefore(badge('Шаг 2 из 4'), crossCard.firstChild.nextSibling);
  crossCard.style.marginBottom='20px';
  crossCard.append(grid(2,[
    btn('КЛ/ККК',()=>{if(m.crossType==='КЛ/ККК')clearCross();else{clearCross();m.X=1;m.crossType='КЛ/ККК';}rerender();},m.crossType==='КЛ/ККК'?'on':''),
    btn('КДК к ДК',()=>{if(m.crossType==='КДК к ДК')clearCross();else{clearCross();m.T=1;m.crossType='КДК к ДК';}rerender();},m.crossType==='КДК к ДК'?'on':''),
    btn('Селфи n2b',()=>{if(m.crossType==='Селфи n2b'){const prev=m.AC;clearCross();m.AC=m.primaryType==='Селфи n2b'?prev:Math.max(0,prev-1);}else{clearCross();m.AC++;m.crossType='Селфи n2b';}rerender();},m.crossType==='Селфи n2b'?'on':''),
    btn('Селфи ДК', ()=>{if(m.crossType==='Селфи ДК'){const prev=m.AD;clearCross();m.AD=m.primaryType==='Селфи ДК'?prev:Math.max(0,prev-1);}else{clearCross();m.AD++;m.crossType='Селфи ДК';}rerender();},m.crossType==='Селфи ДК'?'on':''),
    btn('Селфи КК', ()=>{if(m.crossType==='Селфи КК'){const prev=m.AE;clearCross();m.AE=m.primaryType==='Селфи КК'?prev:Math.max(0,prev-1);}else{clearCross();m.AE++;m.crossType='Селфи КК';}rerender();},m.crossType==='Селфи КК'?'on':''),
    btn('Кросс СИМ',()=>{if(m.crossType==='Кросс СИМ')clearCross();else{clearCross();m.AJ=1;m.crossType='Кросс СИМ';}rerender();},m.crossType==='Кросс СИМ'?'on':''),
    btn('Кросс Дет.',()=>{if(m.crossType==='Кросс Детская')clearCross();else{clearCross();m.AN=1;m.crossType='Кросс Детская';}rerender();},m.crossType==='Кросс Детская'?'on':''),
  ]));
  if(needCrossAct) crossCard.append(actBlock('Статус кросса', m.AZ, setCrossAct, m.crossType==='КЛ/ККК'));
  root.append(crossCard);

  // ── СЕКЦИЯ 3: Доп. продажи ──
  const esCard=card('Доп. продажи');
  esCard.insertBefore(badge('Шаг 3 из 4'), esCard.firstChild.nextSibling);
  esCard.style.marginBottom='20px';
  const esItems=[
    ['БС','AA'],['Инвест.','Z'],['ЦП','AB'],['Вок','AO'],
    ['Смарт','AQ'],['Комбо 1Р','AU'],['Кэш','AL'],['Защитник','AM'],
    ['ПДС','AS'],['Пенсия','AT'],['Уст.МП Х5','AR'],
  ];
  const esG=el('div',{cls:'grid g3'});
  esItems.forEach(([lbl,col])=>{
    esG.append(btn(lbl,()=>{m[col]=m[col]?0:1;rerender();},m[col]?'on':''));
  });
  esCard.append(esG);
  if(isKK){
    esCard.append(el('div',{cls:'card-title',css:'margin-top:10px;margin-bottom:6px'},'Только для КК'));
    esCard.append(grid(2,[
      btn('ФЗ CC1',()=>{m.S=m.S?0:1;rerender();},m.S?'on':''),
      btn('УП',()=>{if(m.AP&&m.CO){m.AP=0;m.CO=0;}else{m.AP=1;m.CO=1;}rerender();},m.AP&&m.CO?'on':''),
    ]));
  }
  root.append(esCard);

  // ── СЕКЦИЯ 4: Приложение ──
  const appCard=card('Приложение');
  appCard.insertBefore(badge('Шаг 4 из 4'), appCard.firstChild.nextSibling);
  appCard.style.marginBottom='20px';
  appCard.append(grid(2,[
    btn('Android ✓',()=>{m.CL=1;m.AH=1;rerender();},m.CL===1&&m.AH===1?'btn-green':''),
    btn('Android ✗',()=>{m.CL=1;m.AH=0;rerender();},m.CL===1&&m.AH===0?'on':''),
    btn('iPhone ✓', ()=>{m.CL=0;m.AH=1;rerender();},m.CL===0&&m.AH===1?'btn-green':''),
    btn('iPhone ✗', ()=>{m.CL=0;m.AH=0;rerender();},m.CL===0&&m.AH===0?'on':''),
  ]));
  root.append(appCard);

  root.append(card(null,
    btn('✅  Завершить встречу', completeMtg, 'btn-red btn-full')
  ));

  return root;
}

function pickDC(name,col,count=1) {
  meeting[col]=(meeting[col]||0)+count;
  meeting.primaryType=name;
  goStage('DC_ACT_TR');
}
function pickKK(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  goStage('KK_ACT_TR');
}
function pickSelf(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  goStage('Self_ACT_TR');
}
function pickSpecial(name,col) {
  meeting[col]=(meeting[col]||0)+1;
  meeting.primaryType=name;
  meeting.CM=1;
  goStage('AFTER_APP');
}
function pickRefusal() {
  meeting.AP=1; meeting.CN=1; meeting.CM=1;
  meeting.primaryType='Отказ банка';
  goStage('AFTER_APP');
}

function handleDC(r) {
  if(r==='ВА+ ТР+'){ meeting.M++; meeting.N++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.M++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleKK(r) {
  if(r==='ВА+ ТР+'){ meeting.Q++; meeting.R++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.Q++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleSelf(r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; meeting.AY=2; }
  else if(r==='ВА+ ТР-'){ meeting.AF++; meeting.AY=1; }
  else meeting.AY=0;
  goStage('CP');
}
function handleKL(r) {
  if(r==='ТР+'){ meeting.Y++; meeting.AZ=2; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleKDK(r) {
  if(r==='ВА+ ТР+'){ meeting.V++; meeting.W++; meeting.AZ=2; }
  else if(r==='ВА+ ТР-'){ meeting.V++; meeting.AZ=1; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleSelf2(r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; meeting.AZ=2; }
  else if(r==='ВА+ ТР-'){ meeting.AF++; meeting.AZ=1; }
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}
function handleDiff(r) {
  if(r==='ВА+ ТР+') meeting.AZ=2;
  else if(r==='ВА+ ТР-') meeting.AZ=1;
  else meeting.AZ=0;
  goStage('EXTRA_SALES_0');
}

  const chips=el('div',{cls:'chips'});
  if(m.primaryType) chips.append(el('span',{cls:'chip red'},`📌 ${m.primaryType}`));
  if(m.crossType)   chips.append(el('span',{cls:'chip'},`🔗 ${m.crossType}`));
  if(m.moreProduct1Type) chips.append(el('span',{cls:'chip'},`➕ ${m.moreProduct1Type}`));
  if(m.moreProduct2Type) chips.append(el('span',{cls:'chip'},`➕ ${m.moreProduct2Type}`));
  const extras=[];
  if(m.AA)extras.push('БС'); if(m.Z)extras.push('Инвест.'); if(m.AB)extras.push('ЦП');
  if(m.AO)extras.push('Вок'); if(m.S)extras.push('ФЗ CC1'); if(m.CO)extras.push('УП');
  if(m.AL)extras.push('Кэш'); if(m.AM)extras.push('Защитник'); if(m.AQ)extras.push('Смарт');
  if(m.AS)extras.push('ПДС'); if(m.AT)extras.push('Пенсия'); if(m.AU)extras.push('Комбо 1Р');
  extras.forEach(e=>chips.append(el('span',{cls:'chip'},e)));
  if(chips.children.length) c.append(chips);

  c.append(el('div',{css:'margin-bottom:7px'},
    btn('✅  Завершить встречу', completeMtg, 'btn-red btn-full')
  ));

  // Ещё продукт (только если не было 2 доп. продукта)
  if (!m.moreProduct1Type) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('➕  Ещё продукт', ()=>goStage('MORE_PRODUCT1'),'btn-outline btn-full')
    ));
  } else if (!m.moreProduct2Type) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('➕  Добавить ещё', ()=>goStage('MORE_PRODUCT2'),'btn-outline btn-full')
    ));
  }

  // Если спец. продукт — показываем «Продажи»
  if (m.CM && !m.primaryType?.includes('Отказ')) {
    c.append(el('div',{css:'margin-bottom:7px'},
      btn('💼  Доп. продажи', ()=>goStage('EXTRA_SALES_0'),'btn-outline btn-full')
    ));
  }

  return c;
}

/* ─── MORE PRODUCTS ─── */
function renderMoreProduct(num) {
  const c=card(`Дополнительный продукт ${num}`);
  c.append(desc(`Выберите ${num===1?'первый':'второй'} дополнительный продукт:`));
  c.append(grid(3,[
    btn('DC',            ()=>pickMore(num,'DC','F','dc')),
    btn('DC X5',         ()=>pickMore(num,'DC X5','G','dc')),
    btn('Селфи n2b',   ()=>pickMore(num,'Селфи n2b','AC','self')),
    btn('Селфи ДК',    ()=>pickMore(num,'Селфи ДК','AD','self')),
    btn('Селфи КК',    ()=>pickMore(num,'Селфи КК','AE','self')),
    btn('Кросс СИМ',    ()=>pickMore(num,'Кросс СИМ','AJ','diff')),
    btn('Кросс Детская',()=>pickMore(num,'Кросс Детская','AN','diff')),
  ]));
  return c;
}
function pickMore(num,name,col,type) {
  meeting[col]=(meeting[col]||0)+1;
  if(num===1){ meeting.moreProduct1Type=name; }
  else       { meeting.moreProduct2Type=name; }
  const exact = {
    dc:   { 1:'MORE_DC_ACT_TR_1',    2:'MORE_DC_ACT_TR_2'    },
    self: { 1:'MORE_Self_ACT_TR_1',  2:'MORE_Selfe_ACT_TR_2' },
    diff: { 1:'MORE_Diff_ACT_TR_1',  2:'MORE_Diff_ACT_TR_2'  },
  };
  goStage(exact[type][num]);
}

function handleMoreDC(num,r) {
  if(r==='ВА+ ТР+'){ meeting.M++; meeting.N++; num===1?(meeting.BA=2):(meeting.BB=2); }
  else if(r==='ВА+ ТР-'){ meeting.M++; num===1?(meeting.BA=1):(meeting.BB=1); }
  afterMore(num);
}
function handleMoreSelf(num,r) {
  if(r==='ВА+ ТР+'){ meeting.AF++; meeting.AG++; num===1?(meeting.BA=2):(meeting.BB=2); }
  else if(r==='ВА+ ТР-'){ meeting.AF++; num===1?(meeting.BA=1):(meeting.BB=1); }
  afterMore(num);
}
function handleMoreDiff(num,r) {
  if(r==='ВА+ ТР+') num===1?(meeting.BA=2):(meeting.BB=2);
  else if(r==='ВА+ ТР-') num===1?(meeting.BA=1):(meeting.BB=1);
  afterMore(num);
}
function afterMore(num) {
  goStage('AFTER_APP');
}

/* ─── RESULT ─── */
function renderResult() {
  const m = history[history.length-1];
  if (!m) { goHome(); return el('div',{}); }
  const root=el('div',{});
  const act=v=>v===2?'ВА+ ТР+':v===1?'ВА+ ТР-':'В+';

  const sc=card('Результат встречи');
  sc.append(el('div',{cls:'total'},`${m.AV} ₽`));
  if(m.clientName) sc.append(rrow('Клиент', m.clientName));
  sc.append(rrow('Дата', m.date));
  if(m.primaryType) sc.append(rrow('Основной продукт', `${m.primaryType}  ·  ${act(m.AY)}`));
  if(m.crossType)   sc.append(rrow('Кросс продукт',    `${m.crossType}  ·  ${act(m.AZ)}`));
  if(m.moreProduct1Type) sc.append(rrow('Доп. продукт 1', `${m.moreProduct1Type}  ·  ${act(m.BA)}`));
  if(m.moreProduct2Type) sc.append(rrow('Доп. продукт 2', `${m.moreProduct2Type}  ·  ${act(m.BB)}`));
  root.append(sc);

  // Доп. продажи
  const extras=[];
  if(m.AA) extras.push('💰 БС (покупка)');
  if(m.Z)  extras.push('💼 Инвесткопилка');
  if(m.AB) extras.push('💳 ЦП');
  if(m.AO) extras.push('📱 Вок');
  if(m.S)  extras.push('🏷 ФЗ CC1');
  if(m.CO) extras.push('✅ УП');
  if(m.AL) extras.push('🛒 Кэш');
  if(m.AM) extras.push('🛡 Защитник');
  if(m.AQ) extras.push('💡 Смарт');
  if(m.AR) extras.push('📲 Уст.МП Х5');
  if(m.AS) extras.push('📊 ПДС');
  if(m.AT) extras.push('👴 Пенсия');
  if(m.AU) extras.push('📦 Комбо 1Р');
  if(extras.length) {
    const ec=card('Дополнительные продажи');
    extras.forEach(e=>ec.append(el('div',{css:'padding:4px 0;font-size:13px'},e)));
    root.append(ec);
  }

  // Приложение
  const apc=card('Приложение');
  apc.append(rrow(m.CL===1?'Android':'iPhone', m.AH===1?'✓ Установлено':'✗ Не установлено'));
  root.append(apc);

  root.append(card(null,
    grid(1,[
      btn('▶  Новая встреча', startMtg, 'btn-red btn-full'),
      btn('← Главная',       goHome,   'btn-outline btn-full'),
    ])
  ));
  return root;
}

// ═══════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(keepScroll) {
  const root=document.getElementById('root');
  root.innerHTML='';
  root.className='fade';
  let node;
  if      (screen==='home')    node=renderHome();
  else if (screen==='meeting') node=renderMeeting();
  else if (screen==='result')  node=renderResult();
  else                         node=renderHome();
  root.append(node);
  if (!keepScroll) window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.getElementById('hdate').textContent =
  new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});

render();
</script>
