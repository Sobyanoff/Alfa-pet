# /etc/nginx/sites-available/alfa-tracker
# Плейсхолдер __DOMAIN__ заменяется deploy.sh на реальный домен.
# certbot --nginx после первой установки добавит сюда server-блок на 443 и редирект.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 5m;

    # Здоровье/диагностика nginx (необязательно)
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # Простой gzip для статики из Express
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;
}
